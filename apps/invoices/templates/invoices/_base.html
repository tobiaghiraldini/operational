{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Invoices{% endblock %} - Operational</title>
  <link rel="stylesheet" href="{% static 'css/home.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <header class="bg-white border-b border-slate-200">
    <div class="mx-auto max-w-5xl px-4 py-4 flex items-center justify-between gap-4">
      <a href="{% url 'invoices:invoice_list' %}" class="font-semibold text-slate-900">Invoices</a>
      <nav class="flex gap-4 text-sm text-slate-600">
        <a href="{% url 'invoices:invoice_list' %}" class="hover:text-slate-900">List</a>
        <a href="{% url 'invoices:invoice_upload' %}" class="hover:text-slate-900">Upload</a>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-5xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
