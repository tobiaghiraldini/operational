{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Accounting{% endblock %} - Operational</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/home.css' %}">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <header class="bg-white border-b border-slate-200">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <a href="{% url 'accounting:dashboard' %}" class="font-display text-lg font-extrabold text-slate-900">
        Operational <span class="text-gradient-brand">Accounting</span>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600">
        <a href="{% url 'accounting:dashboard' %}" class="hover:text-slate-900">Dashboard</a>
        <a href="{% url 'accounting:period_list' %}" class="hover:text-slate-900">Periods</a>
        <a href="{% url 'accounting:daybook' %}" class="hover:text-slate-900">Daybook</a>
        <a href="{% url 'accounting:import_bank_statement' %}" class="hover:text-slate-900">Import bank PDF</a>
        <a href="{% url 'accounting:setup_intro' %}" class="hover:text-slate-900">Settings</a>
      </nav>
    </div>
  </header>

  {% if messages %}
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 mt-4 space-y-2">
      {% for message in messages %}
        <div class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm
                    {% if message.tags == 'error' %}text-red-700 border-red-200 bg-red-50
                    {% elif message.tags == 'success' %}text-emerald-700 border-emerald-200 bg-emerald-50
                    {% else %}text-slate-700{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
