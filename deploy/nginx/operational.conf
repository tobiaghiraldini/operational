# Site snippet for /etc/nginx/sites-available/operational
# Enable: sudo ln -s .../operational.conf /etc/nginx/sites-enabled/
# Test:   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust paths to match the server checkout and Django STATIC_ROOT / MEDIA_ROOT.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name operational.cloud;

    # Invoice uploads (see INVOICE_* settings); raise if needed
    client_max_body_size 55m;

    # Collected static (run: python manage.py collectstatic)
    location /static/ {
        alias /home/Tobj/Code/Ninjabit/Operational/operational/staticfiles/;
    }

    location /media/ {
        alias /home/Tobj/Code/Ninjabit/Operational/operational/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
