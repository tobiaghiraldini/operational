# Site snippet for /etc/nginx/sites-available/operational.conf
# Enable:
#   sudo ln -s /etc/nginx/sites-available/operational.conf /etc/nginx/sites-enabled/operational.conf
# Test:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Supports:
# - apex domain: operational.cloud
# - tenant wildcard subdomains: *.operational.cloud
#
# Static/media paths: run deploy/nginx/prepare_www_dirs.sh on the server first.
# TLS cert paths below assume a cert named "operational.cloud".

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name operational.cloud *.operational.cloud;

    # ACME challenge for certbot renewals.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Enforce HTTPS for all hosts once certificates are installed.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name operational.cloud *.operational.cloud;

    ssl_certificate /etc/letsencrypt/live/operational.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/operational.cloud/privkey.pem;

    # Reasonable TLS defaults.
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Collected static (run: python manage.py collectstatic)
    location /static/ {
        alias /var/www/operational/static/;
    }

    location /media/ {
        alias /var/www/operational/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
